<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Economia de Tokens em IDEs Agênticas</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&family=JetBrains+Mono:wght@400;600&display=swap');

* { margin:0; padding:0; box-sizing:border-box; }

:root {
  --gold: #c9a655;
  --gold-dim: #a08040;
  --gold-glow: #e8c96a;
  --bg: #0a0a0f;
  --bg-card: #12121a;
  --bg-elevated: #1a1a25;
  --text: #e8e8f0;
  --text-dim: #8888a0;
  --accent-blue: #4a9eff;
  --accent-green: #4ade80;
  --accent-red: #ef4444;
  --accent-purple: #a78bfa;
  --accent-orange: #fb923c;
}

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow: hidden;
  width: 100vw;
  height: 100vh;
  margin: 0;
}

#root {
  width: 100vw;
  height: 100vh;
}

.slide {
  width: 100%;
  height: 100vh;
  display: none;
  padding: 5vh 5vw;
  position: relative;
  overflow: hidden;
}

.slide.active { display: flex; flex-direction: column; }

/* Animations */
@keyframes fadeInUp { from { opacity:0; transform:translateY(40px); } to { opacity:1; transform:translateY(0); } }
@keyframes fadeInLeft { from { opacity:0; transform:translateX(-60px); } to { opacity:1; transform:translateX(0); } }
@keyframes fadeInRight { from { opacity:0; transform:translateX(60px); } to { opacity:1; transform:translateX(0); } }
@keyframes scaleIn { from { opacity:0; transform:scale(0.85); } to { opacity:1; transform:scale(1); } }
@keyframes pulse { 0%,100% { opacity:0.4; } 50% { opacity:1; } }
@keyframes slideDown { from { opacity:0; transform:translateY(-30px); } to { opacity:1; transform:translateY(0); } }
@keyframes glow { 0%,100% { box-shadow:0 0 20px rgba(201,166,85,0.2); } 50% { box-shadow:0 0 40px rgba(201,166,85,0.5); } }
@keyframes typewriter { from { width:0; } to { width:100%; } }
@keyframes float { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-10px); } }
@keyframes countUp { from { opacity:0; transform:scale(0.5); } to { opacity:1; transform:scale(1); } }
@keyframes slideIn { from { opacity:0; transform:translateX(60px); } to { opacity:1; transform:translateX(0); } }
@keyframes slideInLeft { from { opacity:0; transform:translateX(-60px); } to { opacity:1; transform:translateX(0); } }
@keyframes fadeScale { from { opacity:0; transform:scale(0.95); } to { opacity:1; transform:scale(1); } }

.slide-entering { animation: slideIn 0.4s ease-out; }

.anim-1 { animation: fadeInUp 0.6s ease-out 0.1s both; }
.anim-2 { animation: fadeInUp 0.6s ease-out 0.25s both; }
.anim-3 { animation: fadeInUp 0.6s ease-out 0.4s both; }
.anim-4 { animation: fadeInUp 0.6s ease-out 0.55s both; }
.anim-5 { animation: fadeInUp 0.6s ease-out 0.7s both; }
.anim-left { animation: fadeInLeft 0.7s ease-out 0.2s both; }
.anim-right { animation: fadeInRight 0.7s ease-out 0.2s both; }
.anim-scale { animation: scaleIn 0.5s ease-out 0.3s both; }
.anim-down { animation: slideDown 0.5s ease-out 0.2s both; }

.slide-number {
  position: absolute;
  bottom: 2vh;
  right: 3vw;
  font-family: 'JetBrains Mono', monospace;
  font-size: clamp(10px, 1vw, 14px);
  color: var(--gold-dim);
  letter-spacing: 2px;
}

.progress-bar {
  position: absolute;
  top: 0;
  left: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--gold), var(--gold-glow));
  transition: width 0.4s ease;
}

h1 { font-size: clamp(32px, 5vw, 64px); font-weight: 900; line-height: 1.1; }
h2 { font-size: clamp(24px, 3.5vw, 48px); font-weight: 700; line-height: 1.2; }
h3 { font-size: clamp(16px, 2.2vw, 32px); font-weight: 600; }
p, li { font-size: clamp(14px, 1.6vw, 22px); line-height: 1.6; color: var(--text-dim); }

.gold { color: var(--gold); }
.green { color: var(--accent-green); }
.red { color: var(--accent-red); }
.blue { color: var(--accent-blue); }
.purple { color: var(--accent-purple); }
.orange { color: var(--accent-orange); }

.card {
  background: var(--bg-card);
  border: 1px solid rgba(201,166,85,0.15);
  border-radius: clamp(8px, 1.2vw, 16px);
  padding: clamp(12px, 2vw, 32px);
  transition: all 0.3s;
}
.card:hover { border-color: var(--gold); transform: translateY(-2px); }

.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: clamp(12px, 2vw, 32px); }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: clamp(10px, 1.5vw, 24px); }
.grid-4 { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: clamp(8px, 1.2vw, 20px); }

@media (max-width: 900px) {
  .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
  .comparison { flex-direction: column; }
}

.tag {
  display: inline-block;
  padding: clamp(2px, 0.4vw, 4px) clamp(8px, 1vw, 14px);
  border-radius: 20px;
  font-size: clamp(10px, 1vw, 13px);
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
}
.tag-gold { background: rgba(201,166,85,0.15); color: var(--gold); }
.tag-blue { background: rgba(74,158,255,0.15); color: var(--accent-blue); }
.tag-green { background: rgba(74,222,128,0.15); color: var(--accent-green); }
.tag-red { background: rgba(239,68,68,0.15); color: var(--accent-red); }

.big-number {
  font-size: clamp(36px, 5vw, 72px);
  font-weight: 900;
  font-family: 'JetBrains Mono', monospace;
  line-height: 1;
}

code {
  font-family: 'JetBrains Mono', monospace;
  background: rgba(201,166,85,0.1);
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 0.85em;
  color: var(--gold);
  word-break: break-all;
}

.flow-arrow {
  display: flex;
  align-items: center;
  gap: 16px;
  font-size: 20px;
}
.flow-arrow::after {
  content: '→';
  color: var(--gold);
  font-size: 28px;
}

.divider {
  width: 80px;
  height: 3px;
  background: linear-gradient(90deg, var(--gold), transparent);
  margin: 16px 0;
}

.subtitle {
  font-size: 24px;
  color: var(--text-dim);
  font-weight: 300;
  margin-top: 12px;
}

.icon-circle {
  width: clamp(36px, 4vw, 56px);
  height: clamp(36px, 4vw, 56px);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: clamp(16px, 1.8vw, 24px);
  flex-shrink: 0;
}

.terminal {
  background: #0d1117;
  border: 1px solid #30363d;
  border-radius: clamp(6px, 1vw, 12px);
  padding: clamp(12px, 1.5vw, 24px);
  font-family: 'JetBrains Mono', monospace;
  font-size: clamp(11px, 1.1vw, 16px);
  line-height: 1.8;
  color: #c9d1d9;
  overflow-x: auto;
}
.terminal .prompt { color: var(--accent-green); }
.terminal .comment { color: #6e7681; }
.terminal .highlight { color: var(--gold); }
.terminal .error { color: var(--accent-red); }

.comparison { display: flex; gap: clamp(16px, 2.5vw, 40px); align-items: stretch; flex-wrap: wrap; }
.comparison > div { flex: 1; }
.comparison .bad { border-color: rgba(239,68,68,0.3); }
.comparison .good { border-color: rgba(74,222,128,0.3); }
.comparison .label { font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 12px; }
.comparison .label.bad { color: var(--accent-red); }
.comparison .label.good { color: var(--accent-green); }

.nav-hint {
  position: absolute;
  bottom: 2vh;
  left: 3vw;
  font-size: clamp(9px, 0.8vw, 12px);
  color: var(--text-dim);
  opacity: 0.5;
}

/* Cover slide special */
.cover-bg {
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at 30% 50%, rgba(201,166,85,0.08) 0%, transparent 60%),
              radial-gradient(ellipse at 70% 80%, rgba(74,158,255,0.05) 0%, transparent 50%);
}

@media (max-width: 900px) {
  :root { --deco-display: none; }
  .slide { padding: 3vh 4vw; }
  .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
  .comparison { flex-direction: column; }
  h1 { font-size: clamp(28px, 7vw, 48px); }
  h2 { font-size: clamp(20px, 5vw, 36px); }
  h3 { font-size: clamp(14px, 3.5vw, 24px); }
  p, li { font-size: clamp(12px, 2.8vw, 18px); }
  .big-number { font-size: clamp(28px, 8vw, 48px); }
  .terminal { font-size: clamp(9px, 2.5vw, 13px); padding: clamp(8px, 2vw, 16px); }
  .icon-circle { width: 36px; height: 36px; font-size: 16px; }
  .card { padding: clamp(8px, 2vw, 16px); }
}

@media (min-width: 901px) and (max-width: 1400px) {
  .slide { padding: 4vh 4vw; }
}

@media (min-width: 1401px) {
  .slide { padding: 5vh 5vw; }
}

/* Decorative elements */
.deco-line {
  position: absolute;
  width: 200px;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback } = React;

const TOTAL_SLIDES = 20;

function SlideFrame({ current, children }) {
  return (
    <div className="slide active slide-entering" key={current} style={{position:'relative'}}>
      <div className="progress-bar" style={{width: `${((current+1)/TOTAL_SLIDES)*100}%`}} />
      {children}
      <div className="slide-number">{String(current+1).padStart(2,'0')} / {TOTAL_SLIDES}</div>
      <div className="nav-hint">← → ou toque para navegar</div>
    </div>
  );
}

/* ===== SLIDE 1: COVER ===== */
function Slide01() {
  return (
    <SlideFrame current={0}>
      <div className="cover-bg" />
      <div style={{flex:1, display:'flex', flexDirection:'column', justifyContent:'center', position:'relative', zIndex:1}}>
        <div className="anim-1">
          <span className="tag tag-gold">Guia Definitivo · Julho 2026</span>
        </div>
        <h1 className="anim-2" style={{marginTop:'2vh'}}>
          <span className="gold">Economia de Tokens</span><br/>
          em IDEs Agênticas
        </h1>
        <p className="anim-3 subtitle" style={{maxWidth:'60vw', marginTop:'2vh'}}>
          Maximizar cada centavo em IA Generativa — do system prompt ao output final
        </p>
        <div className="divider anim-4" style={{marginTop:'3vh'}} />
        <div className="anim-5" style={{display:'flex', gap:'2vw', marginTop:'3vh', flexWrap:'wrap'}}>
          {['Oh My Pi','OpenCode','Claude Code','Cursor','Cline','Aider'].map(ide => (
            <span key={ide} style={{fontSize:'clamp(11px,1vw,14px)', color:'var(--text-dim)', padding:'6px 16px', border:'1px solid rgba(201,166,85,0.2)', borderRadius:8}}>{ide}</span>
          ))}
        </div>
      </div>
      <div className="anim-scale" style={{position:'absolute', right:'8vw', top:'50%', transform:'translateY(-50%)', display:'var(--deco-display, flex)'}}>
        <div style={{width:'clamp(120px,18vw,300px)', height:'clamp(120px,18vw,300px)', borderRadius:'50%', border:'2px solid rgba(201,166,85,0.15)', display:'flex', alignItems:'center', justifyContent:'center', animation:'glow 3s ease-in-out infinite'}}>
          <div className="big-number gold" style={{fontSize:'clamp(40px,5vw,80px)'}}>T</div>
        </div>
      </div>
    </SlideFrame>
  );
}

/* ===== SLIDE 2: QUOTES ===== */
function Slide02() {
  return (
    <SlideFrame current={1}>
      <div style={{flex:1, display:'flex', flexDirection:'column', justifyContent:'center', alignItems:'center', textAlign:'center'}}>
        <div className="anim-1" style={{fontSize:120, color:'var(--gold-dim)', opacity:0.3, fontFamily:'Georgia', lineHeight:1}}>"</div>
        <h2 className="anim-2" style={{maxWidth:1000, fontWeight:300, fontSize:40, lineHeight:1.5}}>
          O contexto é o novo <span className="gold">petróleo</span>.<br/>
          Quem gerencia bem, produz mais com menos.
        </h2>
        <div className="divider anim-3" style={{margin:'32px auto'}} />
        <p className="anim-4" style={{fontSize:18, color:'var(--text-dim)'}}>
          Cada token no system prompt custa <span className="gold">N×</span> ao longo da sessão
        </p>
      </div>
    </SlideFrame>
  );
}

/* ===== SLIDE 3: O QUE É UM HARNESS ===== */
function Slide03() {
  return (
    <SlideFrame current={2}>
      <span className="tag tag-blue anim-1">Parte 0</span>
      <h2 className="anim-2" style={{marginTop:16}}>O que é um <span className="blue">Harness Agêntico</span></h2>
      <div className="divider anim-2" />
      <p className="anim-3" style={{fontSize:22, maxWidth:900, marginBottom:40}}>
        A camada de software entre você e o LLM — o orquestrador que conecta UI, contexto e tools.
      </p>
      <div className="grid-4 anim-4">
        {[
          {icon:'🖥️', title:'UI Layer', desc:'Chat, editor, indicadores de status'},
          {icon:'🧠', title:'Context Manager', desc:'Monta system prompt, gerencia histórico'},
          {icon:'🔧', title:'Tool Router', desc:'Executa bash, read, edit, MCP'},
          {icon:'⚡', title:'LLM Gateway', desc:'Envia prompt, recebe resposta em streaming'},
        ].map((c,i) => (
          <div key={i} className="card" style={{textAlign:'center'}}>
            <div className="icon-circle" style={{background:'rgba(74,158,255,0.1)', margin:'0 auto 16px'}}>{c.icon}</div>
            <h3 style={{fontSize:18, marginBottom:8}}>{c.title}</h3>
            <p style={{fontSize:15}}>{c.desc}</p>
          </div>
        ))}
      </div>
      <div className="anim-5" style={{marginTop:32, display:'flex', gap:24}}>
        <div className="card" style={{flex:1, display:'flex', alignItems:'center', gap:16}}>
          <span className="tag tag-green">IDE</span>
          <span style={{fontSize:16}}>VS Code, Cursor, Oh My Pi</span>
        </div>
        <div className="card" style={{flex:1, display:'flex', alignItems:'center', gap:16}}>
          <span className="tag tag-gold">Harness</span>
          <span style={{fontSize:16}}>OpenCode, Claude Code, Cline</span>
        </div>
        <div className="card" style={{flex:1, display:'flex', alignItems:'center', gap:16}}>
          <span className="tag tag-blue">LLM</span>
          <span style={{fontSize:16}}>Claude, GPT-4o, Gemini, DeepSeek</span>
        </div>
      </div>
    </SlideFrame>
  );
}

/* ===== SLIDE 4: FLUXO COMPLETO ===== */
function Slide04() {
  return (
    <SlideFrame current={3}>
      <span className="tag tag-blue anim-1">Capítulo 0.2</span>
      <h2 className="anim-2" style={{marginTop:16}}>O <span className="gold">Fluxo Completo</span> de uma Chamada</h2>
      <div className="divider anim-2" />
      <div className="anim-3" style={{display:'flex', gap:24, marginTop:32, flex:1}}>
        <div style={{flex:'0 0 260px'}}>
          {[
            {phase:'1. Montagem', tokens:'5-15K', color:'var(--accent-blue)'},
            {phase:'2. Envio ao LLM', tokens:'HTTP POST', color:'var(--accent-purple)'},
            {phase:'3. Processamento', tokens:'N tool calls', color:'var(--gold)'},
            {phase:'4. Output', tokens:'Texto + tools', color:'var(--accent-green)'},
          ].map((s,i) => (
            <div key={i} className="card" style={{marginBottom:16, borderLeftColor:s.color, borderLeftWidth:3}}>
              <div style={{fontSize:13, color:s.color, fontWeight:700, letterSpacing:1}}>{s.phase}</div>
              <div style={{fontSize:15, marginTop:4}}>{s.tokens}</div>
            </div>
          ))}
        </div>
        <div className="terminal" style={{flex:1, fontSize:15}}>
          <div><span className="comment">// Usuário digita:</span></div>
          <div><span className="prompt">"</span>Crie um componente Button<span className="prompt">"</span></div>
          <br/>
          <div><span className="comment">// Fase 1 — System Prompt montado:</span></div>
          <div>  Instruções base: <span className="highlight">~1-2K</span> tokens</div>
          <div>  AGENTS.md: <span className="highlight">~1-3K</span> tokens</div>
          <div>  Tools disponíveis: <span className="highlight">~2-5K</span> tokens</div>
          <div>  <span className="highlight">TOTAL: ~5-15K tokens por chamada</span></div>
          <br/>
          <div><span className="comment">// Fase 3 — Ciclo de tool calls:</span></div>
          <div>  User → LLM → <span className="highlight">grep</span> → LLM → <span className="highlight">read</span> → LLM → <span className="highlight">edit</span> → Output</div>
          <br/>
          <div><span className="comment">// Cada turno = 1 chamada separada ao LLM</span></div>
          <div><span className="error">// Uma tarefa "simples" = 5-10 chamadas</span></div>
        </div>
      </div>
    </SlideFrame>
  );
}

/* ===== SLIDE 5: ANATOMIA DO TOKEN ===== */
function Slide05() {
  return (
    <SlideFrame current={4}>
      <span className="tag tag-gold anim-1">Parte I · Fundamentos</span>
      <h2 className="anim-2" style={{marginTop:16}}>Anatomia de um <span className="gold">Token</span></h2>
      <div className="divider anim-2" />
      <div className="anim-3" style={{display:'flex', gap:40, marginTop:32, flex:1}}>
        <div style={{flex:1}}>
          <h3 style={{fontSize:24, marginBottom:20}}>O que é um token (de verdade)</h3>
          <p style={{marginBottom:24}}>
            Um token <strong style={{color:'var(--accent-red)'}}>não</strong> é uma palavra. É a unidade atômica que o tokenizer do modelo usa para comprimir texto.
          </p>
          <div className="terminal" style={{fontSize:14}}>
            <div><span className="highlight">import React from 'react'</span> → 6 tokens</div>
            <div><span className="highlight">  useEffect(() =&gt; {'{'}</span> → 4 tokens</div>
            <div><span className="highlight">https://supabase.co</span> → 5 tokens</div>
            <div><span className="highlight">src/features/catalogo/services/pedidos.service.ts</span> → 12 tokens</div>
            <br/>
            <div><span className="comment">Código: ~1.3 tokens/palavra</span></div>
            <div><span className="error">URLs e paths são CAROS</span></div>
          </div>
        </div>
        <div style={{flex:1}}>
          <h3 style={{fontSize:24, marginBottom:20}}>4 Fontes de Consumo</h3>
          {[
            {name:'System Prompt', pct:'30-50%', color:'var(--accent-blue)', icon:'📋'},
            {name:'Histórico', pct:'20-40%', color:'var(--accent-purple)', icon:'📚'},
            {name:'Input do Usuário', pct:'1-5%', color:'var(--accent-green)', icon:'💬'},
            {name:'Output do Modelo', pct:'15-30%', color:'var(--gold)', icon:'⚡'},
          ].map((s,i) => (
            <div key={i} className="card" style={{display:'flex', alignItems:'center', gap:16, marginBottom:12}}>
              <span style={{fontSize:24}}>{s.icon}</span>
              <div style={{flex:1}}>
                <div style={{fontSize:16, fontWeight:600}}>{s.name}</div>
                <div style={{height:6, background:'rgba(255,255,255,0.05)', borderRadius:3, marginTop:6}}>
                  <div style={{height:'100%', width:s.pct, background:s.color, borderRadius:3, transition:'width 1s'}} />
                </div>
              </div>
              <span style={{fontSize:20, fontWeight:700, color:s.color, fontFamily:'JetBrains Mono'}}>{s.pct}</span>
            </div>
          ))}
        </div>
      </div>
    </SlideFrame>
  );
}

/* ===== SLIDE 6: ONDE O DINHEIRO VAI ===== */
function Slide06() {
  return (
    <SlideFrame current={5}>
      <span className="tag tag-red anim-1">Insight Crítico</span>
      <h2 className="anim-2" style={{marginTop:16}}>Onde o <span className="red">Dinheiro</span> Realmente Vai</h2>
      <div className="divider anim-2" />
      <div className="anim-3" style={{display:'flex', gap:40, marginTop:32, flex:1}}>
        <div style={{flex:1}}>
          <div className="card" style={{borderColor:'rgba(239,68,68,0.3)', marginBottom:24}}>
            <h3 className="red" style={{fontSize:20, marginBottom:16}}>⚠️ O System Prompt é reenviado em TODA chamada</h3>
            <div className="terminal" style={{fontSize:14}}>
              <div>System prompt: <span className="highlight">8K</span> tokens</div>
              <div>Sessão com <span className="highlight">10</span> tool calls:</div>
              <div style={{marginTop:8}}><span className="error">Custo real = 8K × 10 = 80K tokens</span></div>
              <br/>
              <div><span className="comment">Se o system prompt fosse 4K:</span></div>
              <div><span className="highlight">Custo = 4K × 10 = 40K (50% de economia!)</span></div>
            </div>
          </div>
          <div className="card">
            <h3 style={{fontSize:18, marginBottom:12}}>Regra de Ouro</h3>
            <p style={{fontSize:18}}>
              Cada token no system prompt custa <span className="gold">N×</span> ao longo da sessão, onde N = número de turnos.
            </p>
          </div>
        </div>
        <div style={{flex:1}}>
          <h3 style={{fontSize:24, marginBottom:20}}>Crescimento em 10 Turnos</h3>
          {[
            {turn:'Turno 1', tokens:'5.200', pct:12},
            {turn:'Turno 3', tokens:'10.200', pct:23},
            {turn:'Turno 5', tokens:'20.200', pct:45},
            {turn:'Turno 10', tokens:'45.200', pct:100},
          ].map((t,i) => (
            <div key={i} style={{marginBottom:16}}>

const slides = [Slide01,Slide02,Slide03,Slide04,Slide05,Slide06,Slide07,Slide08,Slide09,Slide10,Slide11,Slide12,Slide13,Slide14,Slide15,Slide16,Slide17,Slide18,Slide19,Slide20];

function App() {
  const [current, setCurrent] = useState(0);

  const go = useCallback((dir) => {
    setCurrent(c => Math.max(0, Math.min(TOTAL_SLIDES-1, c + dir)));
  }, []);

  useEffect(() => {
    const handler = (e) => {
      if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); go(1); }
      if (e.key === 'ArrowLeft') { e.preventDefault(); go(-1); }
      if (e.key === 'Home') { e.preventDefault(); setCurrent(0); }
      if (e.key === 'End') { e.preventDefault(); setCurrent(TOTAL_SLIDES-1); }
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, [go]);

  // Touch/swipe support
  const touchStart = React.useRef(null);
  const handleTouchStart = (e) => { touchStart.current = e.touches[0].clientX; };
  const handleTouchEnd = (e) => {
    if (!touchStart.current) return;
    const diff = touchStart.current - e.changedTouches[0].clientX;
    if (Math.abs(diff) > 50) go(diff > 0 ? 1 : -1);
    touchStart.current = null;
  };

  const SlideComponent = slides[current];
  return <div onTouchStart={handleTouchStart} onTouchEnd={handleTouchEnd} style={{width:'100vw',height:'100vh'}}><SlideComponent /></div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
