name: nomenclature
description: Valida nomenclatura de arquivos e componentes
severity: error
rules:
  componentes:
    pattern: '^[A-Z][a-zA-Z]+$'
    message: 'Componentes devem usar PascalCase'
    examples: ['ListaClientes', 'FormularioCadastro']
  arquivos_ts:
    pattern: '^[a-z0-9-]+(\.(component|service|hook|types|test|spec))?\.tsx?$'
    message: 'Arquivos devem usar kebab-case'
    examples: ['lista-clientes.tsx', 'clientes.service.ts']
  diretorios:
    pattern: '^[a-z0-9-]+$'
    message: 'Diretórios devem usar kebab-case'
    examples: ['cadastros', 'mapas-interativos']
  rotas:
    pattern: '^/[a-z0-9-]+(/[a-z0-9-]+)*$'
    message: 'Rotas devem usar kebab-case'
    examples: ['/cadastros', '/mapas/distribuidores']
